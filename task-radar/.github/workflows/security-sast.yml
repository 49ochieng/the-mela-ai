name: security-sast

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bandit:
    name: bandit (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install bandit[toml]==1.7.9
      # Skip B101 (assert) — we use asserts in tests; enforce on app/ only.
      - run: bandit -r apps/api/app -lll -ii

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          # p/owasp-top-ten covers the OWASP top 10 patterns;
          # p/python and p/javascript add language-specific rules.
          config: >-
            p/owasp-top-ten
            p/python
            p/javascript
            p/secrets
            p/jwt

  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
