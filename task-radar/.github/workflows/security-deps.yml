name: security-deps

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1" # weekly Mon 05:00 UTC

jobs:
  pip-audit:
    name: pip-audit (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pip-audit==2.7.3
      - run: pip-audit -r apps/api/requirements.txt --strict

  npm-audit:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/web }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm audit --omit dev --audit-level=high
