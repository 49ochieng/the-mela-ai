name: CI — Build and Test

on:
  pull_request:
  push:
    branches-ignore:
      - main   # main is handled by cd.yml
  workflow_dispatch:   # allows manual trigger for validation

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check app/    # rules from backend/ruff.toml

      - name: Run tests
        env:
          APP_ENV: development
          DEBUG: "true"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          JWT_SECRET_KEY: "ci-test-key-not-for-production"
          AZURE_TENANT_ID: ""
          AZURE_CLIENT_ID: ""
        run: |
          pip install pytest pytest-asyncio httpx --quiet
          if [ -d tests ]; then
            pytest tests/ -v --tb=short -x -k "not live_prod"
          else
            echo "No tests directory found — skipping"
          fi

      - name: Python dependency audit (pip-audit)
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt

      - name: Build package (zip artifact)
        run: |
          mkdir -p ../artifacts
          zip -r ../artifacts/backend.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude ".pytest_cache/*" \
            --exclude "*.db" \
            --exclude ".env*" \
            --exclude "tests/*"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: backend-${{ github.sha }}
          path: artifacts/backend.zip
          retention-days: 5

  # ── Frontend: lint + type check + build ─────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Next.js standalone)
        env:
          # Provide dummy values so the build doesn't fail on missing env vars
          NEXT_PUBLIC_API_URL: https://armely-ai-api.azurewebsites.net
          NEXT_PUBLIC_API_VERSION: v1
          NEXT_PUBLIC_APP_NAME: "Mela AI"
          NEXT_PUBLIC_ORG_NAME: Armely
          NEXT_PUBLIC_AZURE_AD_CLIENT_ID: "00000000-0000-0000-0000-000000000000"
          NEXT_PUBLIC_AZURE_AD_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          NEXT_PUBLIC_API_SCOPE: "api://00000000-0000-0000-0000-000000000000/access_as_user"
          NEXT_PUBLIC_REDIRECT_URI: https://armely-ai-web.azurewebsites.net
          NEXT_PUBLIC_ENABLE_VOICE: "true"
          NEXT_PUBLIC_ENABLE_FILE_UPLOAD: "true"
          NEXT_PUBLIC_ENABLE_AGENTS: "true"
          NEXT_PUBLIC_ENABLE_RAG: "true"
          NEXT_PUBLIC_ENABLE_TRANSLATION: "true"
          NEXT_PUBLIC_ENABLE_IMAGE_GENERATION: "true"
          NEXT_PUBLIC_ENABLE_DOCUMENT_INTELLIGENCE: "true"
        run: npm run build

      - name: NPM dependency audit (high+)
        continue-on-error: true  # Next.js 14.x has unpatched CVEs - allow build
        run: npm audit --audit-level=high || echo "::warning::NPM audit found vulnerabilities - review required"

      - name: Package standalone output
        run: |
          mkdir -p ../artifacts/frontend
          # Copy standalone server
          cp -r .next/standalone/. ../artifacts/frontend/
          # Copy static assets into standalone expected location
          mkdir -p ../artifacts/frontend/.next
          cp -r .next/static ../artifacts/frontend/.next/static
          # Copy public assets
          cp -r public ../artifacts/frontend/public
          cd ../artifacts
          zip -r frontend.zip frontend/
          rm -rf frontend/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: frontend-${{ github.sha }}
          path: artifacts/frontend.zip
          retention-days: 5
